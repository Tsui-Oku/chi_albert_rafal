<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Onus Commune ― 共有される重荷</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Noto+Serif+JP:wght@300;400;500&display=swap');

  :root {
    --bg:          #1a1410;
    --parchment:   #f5edd8;
    --parchment2:  #e8d9b8;
    --ink:         #1a1208;
    --gold:        #c9973a;
    --gold-bright: #e8b84b;
    --sepia-dark:  #4a3520;
    --sepia-mid:   #9a7a50;
    --sepia-light: #c4a06a;
    --text-main:   #f0e4c8;
    --text-sub:    #c8b090;
    --border:      rgba(180,140,70,0.45);
    --border-top:  rgba(200,160,80,0.85);
    --box-bg:      rgba(14,10,6,0.88);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Noto Serif JP', serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── SCENE ── */
  #scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  #bg-image {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    transition: opacity 1.2s ease;
    filter: sepia(0.35) brightness(0.45) contrast(1.05);
  }

  #scene::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center 60%, transparent 20%, rgba(10,6,2,0.72) 100%);
    pointer-events: none;
    z-index: 1;
  }

  /* ── TEXTBOX ── */
  #textbox {
    position: relative;
    z-index: 10;
    width: min(860px, 94vw);
    margin-bottom: 3.5vh;
    background: var(--box-bg);
    border: 1px solid var(--border);
    border-top: 2.5px solid var(--border-top);
    backdrop-filter: blur(6px);
    box-shadow:
      0 -6px 48px rgba(0,0,0,0.65),
      inset 0 1px 0 rgba(200,160,80,0.2),
      inset 0 0 60px rgba(180,130,50,0.04);
    cursor: pointer;
  }

  #speaker-tag {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: var(--gold-bright);
    letter-spacing: 0.14em;
    padding: 0.6rem 1.6rem 0;
    min-height: 1.8rem;
    opacity: 0;
    transition: opacity 0.5s;
  }

  #text-content {
    font-size: clamp(0.95rem, 1.6vw, 1.12rem);
    line-height: 2.1;
    color: var(--text-main);
    padding: 0.5rem 1.8rem 1.1rem;
    min-height: 6.5rem;
    letter-spacing: 0.06em;
    font-weight: 400;
    text-shadow: 0 1px 3px rgba(0,0,0,0.8);
  }

  #latin-quote {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.88rem;
    color: var(--gold);
    text-align: center;
    padding: 0.5rem 1.8rem 1rem;
    letter-spacing: 0.07em;
    border-top: 1px solid rgba(180,130,50,0.25);
    line-height: 1.9;
    white-space: pre-line;
    opacity: 0;
    transition: opacity 0.9s;
  }

  /* ── CLICK PROMPT ── */
  #click-prompt {
    position: absolute;
    z-index: 11;
    bottom: calc(3.5vh + 4px);
    right: calc((100vw - min(860px,94vw))/2 + 1.6rem);
    width: 9px;
    height: 9px;
    border-right: 2px solid var(--gold);
    border-bottom: 2px solid var(--gold);
    transform: rotate(45deg);
    opacity: 0;
    animation: blink 1.3s ease-in-out infinite;
  }

  @keyframes blink {
    0%,100% { opacity: 0; }
    50%     { opacity: 0.85; }
  }

  /* ── CHOICES ── */
  #choices {
    position: absolute;
    z-index: 10;
    bottom: calc(3.5vh + 215px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 2.5rem;
    opacity: 0;
    transition: opacity 0.6s;
    pointer-events: none;
    white-space: nowrap;
  }

  #choices.visible {
    opacity: 1;
    pointer-events: all;
  }

  .choice-btn {
    font-family: 'Noto Serif JP', serif;
    font-size: 1rem;
    font-weight: 400;
    letter-spacing: 0.18em;
    padding: 0.75rem 2.4rem;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.25s;
    background: rgba(14,10,6,0.82);
    backdrop-filter: blur(6px);
    text-shadow: 0 1px 4px rgba(0,0,0,0.9);
  }

  #btn-yes {
    color: var(--parchment);
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(200,150,60,0.2);
  }

  #btn-yes:hover {
    background: rgba(200,150,60,0.18);
    box-shadow: 0 0 28px rgba(200,150,60,0.5);
    color: #fff;
    border-color: var(--gold-bright);
  }

  #btn-no {
    color: var(--text-sub);
    border-color: rgba(150,110,60,0.55);
    transition: all 0.35s;
  }

  #btn-no:hover {
    background: rgba(80,50,20,0.3);
  }

  /* ── RAFAU REACTION ── */
  #rafau-reaction {
    position: absolute;
    z-index: 20;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.2vw, 1.35rem);
    color: var(--parchment);
    text-align: center;
    opacity: 0;
    pointer-events: none;
    text-shadow:
      0 0 30px rgba(200,160,70,0.55),
      0 2px 8px rgba(0,0,0,0.95);
    transition: opacity 0.4s;
    max-width: 520px;
    line-height: 1.9;
    background: rgba(10,7,3,0.55);
    padding: 1rem 2rem;
    border-top: 1px solid rgba(200,160,70,0.3);
    border-bottom: 1px solid rgba(200,160,70,0.3);
    backdrop-filter: blur(4px);
  }

  #rafau-reaction.visible { opacity: 1; }

  /* ── TITLE SCREEN ── */
  #title-screen {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0c0906;
    transition: opacity 1.6s ease;
  }

  #title-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .title-deco {
    width: 120px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin-bottom: 2rem;
  }

  .title-latin {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.2vw, 1.3rem);
    color: var(--sepia-mid);
    letter-spacing: 0.28em;
    margin-bottom: 1rem;
  }

  .title-main {
    font-family: 'IM Fell English', serif;
    font-size: clamp(2.5rem, 6.5vw, 4.2rem);
    color: var(--gold-bright);
    letter-spacing: 0.06em;
    text-shadow:
      0 0 50px rgba(200,160,60,0.35),
      0 2px 12px rgba(0,0,0,0.8);
    margin-bottom: 0.6rem;
  }

  .title-sub {
    font-family: 'Noto Serif JP', serif;
    font-size: clamp(0.85rem, 1.6vw, 1.05rem);
    color: var(--text-sub);
    font-weight: 300;
    letter-spacing: 0.22em;
    margin-bottom: 0.6rem;
  }

  .title-ep {
    font-family: 'IM Fell English', serif;
    font-size: 0.8rem;
    color: var(--sepia-dark);
    color: #6a5035;
    letter-spacing: 0.16em;
    margin-bottom: 0.5rem;
  }

  .title-deco2 {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--sepia-mid), transparent);
    margin: 1.8rem 0 3rem;
  }

  #start-btn {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--parchment2);
    border: 1px solid var(--sepia-mid);
    padding: 0.85rem 3.2rem;
    background: transparent;
    cursor: pointer;
    letter-spacing: 0.22em;
    transition: all 0.35s;
    animation: pulse-border 2.5s ease-in-out infinite;
  }

  #start-btn:hover {
    border-color: var(--gold);
    color: var(--gold-bright);
    box-shadow: 0 0 24px rgba(200,160,60,0.3);
    animation: none;
  }

  @keyframes pulse-border {
    0%,100% { box-shadow: 0 0 0 rgba(180,130,50,0); }
    50%     { box-shadow: 0 0 16px rgba(180,130,50,0.3); }
  }

  /* ── SHAKE ── */
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-7px); }
    40% { transform: translateX(7px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }
  .shaking { animation: shake 0.35s ease; }

  /* ── ENDING ── */
  #ending-screen {
    position: fixed;
    inset: 0;
    z-index: 90;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0703;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2.2s ease;
  }

  #ending-screen.visible {
    opacity: 1;
    pointer-events: all;
  }

  .ending-deco {
    width: 100px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--sepia-mid), transparent);
    margin-bottom: 2.5rem;
  }

  .ending-latin {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--gold);
    font-size: clamp(1.1rem, 2.8vw, 1.6rem);
    letter-spacing: 0.12em;
    text-align: center;
    margin-bottom: 1.8rem;
    text-shadow: 0 0 30px rgba(200,160,60,0.3);
  }

  .ending-jp {
    font-family: 'Noto Serif JP', serif;
    font-weight: 300;
    font-size: clamp(0.88rem, 1.7vw, 1.05rem);
    color: var(--text-sub);
    text-align: center;
    letter-spacing: 0.1em;
    line-height: 2.4;
    max-width: 580px;
    padding: 0 2rem;
  }

  .ending-deco2 {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--sepia-dark), transparent);
    margin: 2.5rem 0 2rem;
  }

  #replay-btn {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 0.92rem;
    color: var(--sepia-mid);
    border: 1px solid var(--sepia-dark);
    padding: 0.65rem 2.6rem;
    background: transparent;
    cursor: pointer;
    letter-spacing: 0.2em;
    transition: all 0.3s;
  }

  #replay-btn:hover {
    color: var(--gold);
    border-color: var(--sepia-mid);
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.045'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 200;
    animation: drift 10s linear infinite;
  }

  @keyframes drift {
    from { transform: translate(0,0); }
    to   { transform: translate(-50px,-50px); }
  }
</style>
</head>
<body>

<!-- TITLE -->
<div id="title-screen">
  <div class="title-deco"></div>
  <div class="title-latin">Onus Commune</div>
  <div class="title-main">共有される重荷</div>
  <div class="title-sub">チ。 二次創作 ― 第10話</div>
  <div class="title-ep">Albert &amp; Rafał — Universitas</div>
  <div class="title-deco2"></div>
  <button id="start-btn" onclick="startGame()">— Begin —</button>
</div>

<!-- ENDING -->
<div id="ending-screen">
  <div class="ending-deco"></div>
  <div class="ending-latin">Alter alterius onera portate.</div>
  <div class="ending-jp">
    互いに重荷を担いなさい。<br><br>
    ——先生、それは何の事を言っているのですか。<br>
    僕の親を殺しながら、<br>
    いまだ僕と研究していることを仰っているのですか？
  </div>
  <div class="ending-deco2"></div>
  <button id="replay-btn" onclick="location.reload()">— もう一度 —</button>
</div>

<!-- MAIN SCENE -->
<div id="scene">
  <div id="bg-image"></div>
  <div id="rafau-reaction"></div>

  <div id="choices">
    <button class="choice-btn" id="btn-yes" onclick="chooseYes()">　受け取る　</button>
    <button class="choice-btn" id="btn-no"  onclick="chooseNo()">　お断りします　</button>
  </div>

  <div id="click-prompt"></div>

  <div id="textbox" onclick="advanceScene()">
    <div id="speaker-tag"></div>
    <div id="text-content">　</div>
    <div id="latin-quote"></div>
  </div>
</div>

<script>
const IMAGES = {
  cloister  : 'scene1.png',
  classroom : 'scene2.png',
  night     : 'scene3.png',
};

const scenes = [
  {
    bg: 'classroom',
    speaker: 'アルベルト（語り）',
    text: '大学に入って三年目の冬——。なんだか体が熱っぽい。陽の高さから授業の時間だと知れるのに、ベッドから起き上がれなかった。',
    latin: '',
    type: 'narrate'
  },
  {
    bg: 'classroom',
    speaker: 'アルベルト（語り）',
    text: '同室の三人は先に行ってしまった。「先生には伝えておくから」と言い残して。感謝と申し訳なさが、熱の中でじくじくと混ざり合った。',
    latin: '',
    type: 'narrate'
  },
  {
    bg: 'cloister',
    speaker: 'ラファウ先生',
    text: '「聞いたよ、アルベルト君。体調が悪いんだって？　丈夫な君が珍しいね。手が空いてたから見回りに来たんだ」',
    latin: '',
    type: 'narrate'
  },
  {
    bg: 'cloister',
    speaker: 'アルベルト（語り）',
    text: 'よりによって——なんでラファウ先生なんだ。こんな私的な弱みを、あなたには見せたくなかった。',
    latin: '',
    type: 'narrate'
  },
  {
    bg: 'cloister',
    speaker: 'アルベルト（語り）',
    text: 'ラファウ先生はなんということもなさそうに盆の布を取り払った。麦の粥と、少量の蜂蜜。差し出されるスプーンが、恐ろしいほど近い。',
    latin: '',
    type: 'choice'
  },
  {
    bg: 'cloister',
    speaker: 'ラファウ先生',
    text: '「やはり、来てよかったみたいだね」',
    latin: 'Beatius est magis dare quam accipere.\n――受けるよりも、与える方が幸いである',
    type: 'narrate'
  },
  {
    bg: 'night',
    speaker: 'アルベルト（語り）',
    text: 'スプーンの粥を呑み込んで、逆にどれほど自分が渇いていたかを自覚した。二度、三度——差し出されるままに呑んでしまった。',
    latin: '',
    type: 'narrate'
  },
  {
    bg: 'night',
    speaker: 'ラファウ先生',
    text: '「しばらく同室の彼らは修道院に泊まるそうだよ。君に遠慮しているのさ。いい同輩を持ったね」',
    latin: 'Communicantes necessitatibus sanctorum.\n――必要としている者と、分かち合いなさい',
    type: 'narrate'
  },
  {
    bg: 'night',
    speaker: 'アルベルト（語り）',
    text: '先生は去り際にそう言い残した。互いに重荷を担いなさい——先生、それは何の事を言っているのですか。',
    latin: 'Alter alterius onera portate.\n――互いに重荷を担いなさい',
    type: 'ending'
  },
];

const rafauReactions = [
  '「……僕にはどうもそうは見えないけどね」',
  '「神学者が弱った者へ慈善行為をするのはおかしいかい？」',
  '「Amen dico vobis……」',
  '「……」\n\n静かに、もう一度スプーンを差し出す。',
  '「君だけの特別扱いだなんて思わなくていい」',
];

let currentScene = 0;
let noCount = 0;
let isChoicePhase = false;
let canAdvance = true;
let charTimeout = null;

function setBg(key) {
  document.getElementById('bg-image').style.backgroundImage = `url('${IMAGES[key]}')`;
}

function setSpeaker(name) {
  const el = document.getElementById('speaker-tag');
  el.textContent = name;
  el.style.opacity = name ? '1' : '0';
}

function setLatin(text) {
  const el = document.getElementById('latin-quote');
  el.textContent = text;
  el.style.opacity = text ? '1' : '0';
}

function setClickPrompt(show) {
  document.getElementById('click-prompt').style.opacity = show ? '' : '0';
}

function typeText(text, callback) {
  const el = document.getElementById('text-content');
  el.textContent = '';
  canAdvance = false;
  let i = 0;
  clearTimeout(charTimeout);
  (function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      charTimeout = setTimeout(next, 40);
    } else {
      canAdvance = true;
      if (callback) callback();
    }
  })();
}

function showChoices(show) {
  const el = document.getElementById('choices');
  show ? el.classList.add('visible') : el.classList.remove('visible');
}

function showRafauReaction(text) {
  const el = document.getElementById('rafau-reaction');
  el.textContent = text;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 2400);
}

function shakeTextbox() {
  const tb = document.getElementById('textbox');
  tb.classList.remove('shaking');
  void tb.offsetWidth;
  tb.classList.add('shaking');
}

function startGame() {
  const ts = document.getElementById('title-screen');
  ts.classList.add('fade-out');
  setTimeout(() => { ts.style.display = 'none'; renderScene(0); }, 1600);
}

function renderScene(idx) {
  if (idx >= scenes.length) { showEnding(); return; }
  const s = scenes[idx];
  currentScene = idx;
  setBg(s.bg);
  setSpeaker(s.speaker);
  setLatin('');
  showChoices(false);
  setClickPrompt(false);
  isChoicePhase = false;

  typeText(s.text, () => {
    if (s.latin) setLatin(s.latin);
    if (s.type === 'choice') {
      isChoicePhase = true;
      showChoices(true);
    } else if (s.type === 'ending') {
      setTimeout(showEnding, 2000);
    } else {
      setClickPrompt(true);
    }
  });
}

function advanceScene() {
  if (isChoicePhase) return;
  if (!canAdvance) {
    clearTimeout(charTimeout);
    const s = scenes[currentScene];
    document.getElementById('text-content').textContent = s.text;
    if (s.latin) setLatin(s.latin);
    canAdvance = true;
    if (s.type === 'choice') {
      isChoicePhase = true;
      showChoices(true);
    } else if (s.type !== 'ending') {
      setClickPrompt(true);
    }
    return;
  }
  if (scenes[currentScene].type === 'ending') return;
  renderScene(currentScene + 1);
}

function chooseYes() {
  showChoices(false);
  isChoicePhase = false;
  noCount = 0;
  // ボタンを初期状態に戻す
  document.getElementById('btn-no').textContent  = '　お断りします　';
  document.getElementById('btn-no').style.opacity = '1';
  document.getElementById('btn-no').style.pointerEvents = '';
  document.getElementById('btn-yes').textContent = '　受け取る　';
  document.getElementById('btn-yes').style.boxShadow = '';
  renderScene(currentScene + 1);
}

function chooseNo() {
  noCount++;
  shakeTextbox();

  const reaction = rafauReactions[Math.min(noCount - 1, rafauReactions.length - 1)];
  showRafauReaction(reaction);

  const yesBtn = document.getElementById('btn-yes');
  const noBtn  = document.getElementById('btn-no');

  if (noCount === 1) {
    noBtn.textContent = '　いいえ……　';
  } else if (noCount === 2) {
    noBtn.textContent = '　で、でも……　';
    yesBtn.style.boxShadow = '0 0 32px rgba(200,160,60,0.65)';
  } else if (noCount === 3) {
    noBtn.textContent = '　先生……　';
    noBtn.style.opacity = '0.45';
  } else if (noCount >= 4) {
    noBtn.style.opacity = '0';
    noBtn.style.pointerEvents = 'none';
    yesBtn.textContent = '　……受け取る　';
  }
}

function showEnding() {
  document.getElementById('ending-screen').classList.add('visible');
}
</script>
</body>
</html>
